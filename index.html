<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система хранения и анализа данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: #e0e0e0;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .delete-btn, .edit-btn {
            padding: 5px 10px;
            font-size: 12px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
        }

        .edit-btn {
            background: #28a745;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        .message.success {
            background: #28a745;
        }

        .message.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .chart-container {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        canvas {
            max-height: 400px;
        }

        .import-export {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .dynamic-field {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            position: relative;
        }

        .remove-field {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
        }

        .add-field-btn {
            background: #28a745;
            margin-top: 10px;
        }

        .field-type-select {
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 12px;
                display: block;
                overflow-x: auto;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Система хранения и анализа данных</h1>
            <p>Добавляйте ЛЮБЫЕ данные - текст, числа, даты, что угодно!</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add')">➕ Добавить данные</button>
            <button class="tab-btn" onclick="switchTab('view')">📋 Просмотр данных</button>
            <button class="tab-btn" onclick="switchTab('analyze')">📈 Анализ данных</button>
            <button class="tab-btn" onclick="switchTab('manage')">⚙️ Управление</button>
        </div>

        <!-- Вкладка добавления данных -->
        <div id="add-tab" class="tab-content active">
            <h2>Добавить новую запись</h2>
            <div id="dynamic-fields-container">
                <div class="dynamic-field" data-field-id="0">
                    <button class="remove-field" onclick="removeField(0)" style="display:none">✖</button>
                    <div class="form-group">
                        <label>Название поля:</label>
                        <input type="text" class="field-name" placeholder="Например: Имя, Продукт, Сумма..." value="Название">
                    </div>
                    <div class="form-group">
                        <label>Тип данных:</label>
                        <select class="field-type" onchange="changeFieldType(0)">
                            <option value="text">📝 Текст</option>
                            <option value="number">🔢 Число</option>
                            <option value="date">📅 Дата</option>
                            <option value="email">📧 Email</option>
                            <option value="tel">📞 Телефон</option>
                            <option value="color">🎨 Цвет</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Значение:</label>
                        <input type="text" class="field-value" placeholder="Введите значение">
                    </div>
                </div>
            </div>
            <button class="add-field-btn" onclick="addField()">➕ Добавить еще поле</button>
            <button onclick="saveData()" style="margin-left: 10px;">💾 Сохранить запись</button>
        </div>

        <!-- Вкладка просмотра данных -->
        <div id="view-tab" class="tab-content">
            <div class="import-export">
                <button onclick="exportData()">📥 Экспорт в JSON</button>
                <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
                <button onclick="document.getElementById('import-file').click()">📤 Импорт из JSON</button>
                <button onclick="clearAllData()" class="btn-danger">🗑️ Очистить все данные</button>
                <button onclick="loadData()" class="btn-success">🔄 Обновить</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="data-table">
                    <thead id="table-header">
                        <tr>
                            <th>ID</th>
                            <th>Дата создания</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="data-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка анализа данных -->
        <div id="analyze-tab" class="tab-content">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><h3>Всего записей</h3><div class="value" id="total-count">0</div></div>
                <div class="stat-card"><h3>Всего полей</h3><div class="value" id="total-fields">0</div></div>
                <div class="stat-card"><h3>Уникальных значений</h3><div class="value" id="unique-values">0</div></div>
            </div>
            
            <div class="chart-container">
                <h3>Анализ числовых данных</h3>
                <canvas id="numeric-chart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3>Популярность полей</h3>
                <canvas id="fields-chart"></canvas>
            </div>
        </div>

        <!-- Вкладка управления -->
        <div id="manage-tab" class="tab-content">
            <h2>Поиск и фильтрация</h2>
            <div class="form-group">
                <label>🔍 Поиск по всем данным:</label>
                <input type="text" id="global-search" placeholder="Введите текст для поиска..." onkeyup="filterData()">
            </div>
            <div class="form-group">
                <label>📅 Фильтр по дате:</label>
                <input type="date" id="date-filter" onchange="filterData()">
            </div>
            <div id="filtered-results" style="margin-top:20px"></div>
            
            <h2 style="margin-top: 40px;">Статистика по полям</h2>
            <div id="fields-statistics"></div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let currentEditId = null;

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'view') {
                loadData();
            }
            if (tab === 'analyze') {
                loadAnalysis();
            }
            if (tab === 'manage') {
                loadData();
            }
        }

        // Показ сообщения
        function showMessage(message, type = 'success') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Добавление нового поля
        let fieldCounter = 1;
        function addField() {
            const container = document.getElementById('dynamic-fields-container');
            const fieldId = fieldCounter++;
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'dynamic-field';
            fieldDiv.setAttribute('data-field-id', fieldId);
            fieldDiv.innerHTML = `
                <button class="remove-field" onclick="removeField(${fieldId})">✖</button>
                <div class="form-group">
                    <label>Название поля:</label>
                    <input type="text" class="field-name" placeholder="Например: Имя, Продукт, Сумма..." value="Поле ${fieldId}">
                </div>
                <div class="form-group">
                    <label>Тип данных:</label>
                    <select class="field-type" onchange="changeFieldType(${fieldId})">
                        <option value="text">📝 Текст</option>
                        <option value="number">🔢 Число</option>
                        <option value="date">📅 Дата</option>
                        <option value="email">📧 Email</option>
                        <option value="tel">📞 Телефон</option>
                        <option value="color">🎨 Цвет</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Значение:</label>
                    <input type="text" class="field-value" placeholder="Введите значение">
                </div>
            `;
            container.appendChild(fieldDiv);
        }

        function removeField(fieldId) {
            const fields = document.querySelectorAll('.dynamic-field');
            if (fields.length > 1) {
                const field = document.querySelector(`.dynamic-field[data-field-id='${fieldId}']`);
                if (field) field.remove();
            } else {
                showMessage('Должно быть хотя бы одно поле!', 'error');
            }
        }

        function changeFieldType(fieldId) {
            const field = document.querySelector(`.dynamic-field[data-field-id='${fieldId}']`);
            const typeSelect = field.querySelector('.field-type');
            const valueInput = field.querySelector('.field-value');
            const selectedType = typeSelect.value;
            
            valueInput.type = selectedType;
            if (selectedType === 'color') {
                valueInput.value = '#000000';
            }
        }

        // Сохранение данных
        function saveData() {
            const fields = document.querySelectorAll('.dynamic-field');
            const data = {};
            
            for (let field of fields) {
                const name = field.querySelector('.field-name').value;
                const type = field.querySelector('.field-type').value;
                let value = field.querySelector('.field-value').value;
                
                if (!name || !value) {
                    showMessage('Заполните все поля!', 'error');
                    return;
                }
                
                data[name] = {
                    value: value,
                    type: type
                };
            }
            
            // Загружаем существующие данные
            let records = JSON.parse(localStorage.getItem('userData') || '[]');
            
            if (currentEditId !== null) {
                // Редактирование
                const index = records.findIndex(r => r.id === currentEditId);
                if (index !== -1) {
                    records[index] = {
                        id: currentEditId,
                        data: data,
                        createdAt: records[index].createdAt,
                        updatedAt: new Date().toISOString()
                    };
                    showMessage('Запись обновлена!');
                }
                currentEditId = null;
            } else {
                // Новая запись
                const newRecord = {
                    id: Date.now(),
                    data: data,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                records.push(newRecord);
                showMessage('Данные сохранены!');
            }
            
            localStorage.setItem('userData', JSON.stringify(records));
            
            // Очищаем форму
            document.getElementById('dynamic-fields-container').innerHTML = `
                <div class="dynamic-field" data-field-id="0">
                    <button class="remove-field" onclick="removeField(0)" style="display:none">✖</button>
                    <div class="form-group">
                        <label>Название поля:</label>
                        <input type="text" class="field-name" placeholder="Например: Имя, Продукт, Сумма..." value="Название">
                    </div>
                    <div class="form-group">
                        <label>Тип данных:</label>
                        <select class="field-type" onchange="changeFieldType(0)">
                            <option value="text">📝 Текст</option>
                            <option value="number">🔢 Число</option>
                            <option value="date">📅 Дата</option>
                            <option value="email">📧 Email</option>
                            <option value="tel">📞 Телефон</option>
                            <option value="color">🎨 Цвет</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Значение:</label>
                        <input type="text" class="field-value" placeholder="Введите значение">
                    </div>
                </div>
            `;
            fieldCounter = 1;
            
            loadData();
        }

        // Загрузка всех данных
        function loadData() {
            allRecords = JSON.parse(localStorage.getItem('userData') || '[]');
            displayData(allRecords);
            updateFieldsStatistics();
        }

        // Отображение данных в таблице
        function displayData(records) {
            const tbody = document.getElementById('data-list');
            const thead = document.getElementById('table-header');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center">Нет данных</td></tr>';
                thead.innerHTML = '<tr><th>ID</th><th>Дата создания</th><th>Действия</th></tr>';
                return;
            }
            
            // Собираем все уникальные названия полей
            const allFields = new Set();
            records.forEach(record => {
                Object.keys(record.data).forEach(field => allFields.add(field));
            });
            
            // Создаем заголовок таблицы
            let headerHtml = '<tr><th>ID</th>';
            Array.from(allFields).forEach(field => {
                headerHtml += `<th>${field}</th>`;
            });
            headerHtml += '<th>Дата создания</th><th>Действия</th></tr>';
            thead.innerHTML = headerHtml;
            
            // Заполняем данные
            tbody.innerHTML = '';
            records.forEach(record => {
                let rowHtml = `<tr><td>${record.id}</td>`;
                Array.from(allFields).forEach(field => {
                    const value = record.data[field]?.value || '-';
                    const type = record.data[field]?.type;
                    let displayValue = value;
                    if (type === 'color') {
                        displayValue = `<div style="width:30px;height:30px;background:${value};border:1px solid #ddd;"></div>`;
                    }
                    rowHtml += `<td>${displayValue}</td>`;
                });
                rowHtml += `
                    <td>${new Date(record.createdAt).toLocaleString()}</td>
                    <td>
                        <button class="edit-btn" onclick="editRecord(${record.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteRecord(${record.id})">🗑️</button>
                    </td>
                </tr>`;
                tbody.innerHTML += rowHtml;
            });
        }

        // Редактирование записи
        function editRecord(id) {
            const record = allRecords.find(r => r.id === id);
            if (!record) return;
            
            // Очищаем форму
            document.getElementById('dynamic-fields-container').innerHTML = '';
            fieldCounter = 0;
            
            // Заполняем поля из записи
            for (let [fieldName, fieldData] of Object.entries(record.data)) {
                const fieldId = fieldCounter++;
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'dynamic-field';
                fieldDiv.setAttribute('data-field-id', fieldId);
                fieldDiv.innerHTML = `
                    <button class="remove-field" onclick="removeField(${fieldId})">✖</button>
                    <div class="form-group">
                        <label>Название поля:</label>
                        <input type="text" class="field-name" value="${fieldName}">
                    </div>
                    <div class="form-group">
                        <label>Тип данных:</label>
                        <select class="field-type" onchange="changeFieldType(${fieldId})">
                            <option value="text" ${fieldData.type === 'text' ? 'selected' : ''}>📝 Текст</option>
                            <option value="number" ${fieldData.type === 'number' ? 'selected' : ''}>🔢 Число</option>
                            <option value="date" ${fieldData.type === 'date' ? 'selected' : ''}>📅 Дата</option>
                            <option value="email" ${fieldData.type === 'email' ? 'selected' : ''}>📧 Email</option>
                            <option value="tel" ${fieldData.type === 'tel' ? 'selected' : ''}>📞 Телефон</option>
                            <option value="color" ${fieldData.type === 'color' ? 'selected' : ''}>🎨 Цвет</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Значение:</label>
                        <input type="${fieldData.type}" class="field-value" value="${fieldData.value}">
                    </div>
                `;
                document.getElementById('dynamic-fields-container').appendChild(fieldDiv);
            }
            
            currentEditId = id;
            switchTab('add');
            showMessage('Редактирование записи...');
        }

        // Удаление записи
        function deleteRecord(id) {
            if (confirm('Удалить эту запись?')) {
                let records = JSON.parse(localStorage.getItem('userData') || '[]');
                records = records.filter(r => r.id !== id);
                localStorage.setItem('userData', JSON.stringify(records));
                loadData();
                showMessage('Запись удалена');
            }
        }

        // Фильтрация данных
        function filterData() {
            const searchText = document.getElementById('global-search').value.toLowerCase();
            const dateFilter = document.getElementById('date-filter').value;
            
            let filtered = allRecords;
            
            if (searchText) {
                filtered = filtered.filter(record => {
                    return JSON.stringify(record.data).toLowerCase().includes(searchText);
                });
            }
            
            if (dateFilter) {
                filtered = filtered.filter(record => {
                    return record.createdAt.startsWith(dateFilter);
                });
            }
            
            displayData(filtered);
            
            const resultsDiv = document.getElementById('filtered-results');
            resultsDiv.innerHTML = `<p>🔍 Найдено записей: ${filtered.length}</p>`;
        }

        // Обновление статистики по полям
        function updateFieldsStatistics() {
            const statsDiv = document.getElementById('fields-statistics');
            if (allRecords.length === 0) {
                statsDiv.innerHTML = '<p>Нет данных для анализа</p>';
                return;
            }
            
            const fieldStats = {};
            allRecords.forEach(record => {
                Object.keys(record.data).forEach(field => {
                    if (!fieldStats[field]) {
                        fieldStats[field] = { count: 0, values: new Set() };
                    }
                    fieldStats[field].count++;
                    fieldStats[field].values.add(record.data[field].value);
                });
            });
            
            let statsHtml = '<table><thead><tr><th>Поле</th><th>Количество</th><th>Уникальных значений</th></tr></thead><tbody>';
            for (let [field, stats] of Object.entries(fieldStats)) {
                statsHtml += `<tr>
                    <td>${field}</td>
                    <td>${stats.count}</td>
                    <td>${stats.values.size}</td>
                </tr>`;
            }
            statsHtml += '</tbody></table>';
            statsDiv.innerHTML = statsHtml;
        }

        // Загрузка анализа
        function loadAnalysis() {
            const totalCount = allRecords.length;
            const totalFields = allRecords.reduce((sum, r) => sum + Object.keys(r.data).length, 0);
            
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('total-fields').textContent = totalFields;
            
            // Собираем числовые данные
            const numericData = [];
            allRecords.forEach(record => {
                Object.values(record.data).forEach(field => {
                    if (field.type === 'number' && !isNaN(parseFloat(field.value))) {
                        numericData.push(parseFloat(field.value));
                    }
                });
            });
            
            if (numericData.length > 0) {
                const ctx = document.getElementById('numeric-chart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: numericData.map((_, i) => `Значение ${i+1}`),
                        datasets: [{
                            label: 'Числовые значения',
                            data: numericData,
                            backgroundColor: 'rgba(102, 126, 234, 0.6)'
                        }]
                    }
                });
            }
            
            // Статистика по полям
            const fieldNames = {};
            allRecords.forEach(record => {
                Object.keys(record.data).forEach(field => {
                    fieldNames[field] = (fieldNames[field] || 0) + 1;
                });
            });
            
            const ctx2 = document.getElementById('fields-chart').getContext('2d');
            new Chart(ctx2, {
                type: 'pie',
                data: {
                    labels: Object.keys(fieldNames),
                    datasets: [{
                        data: Object.values(fieldNames),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe']
                    }]
                }
            });
        }

        // Экспорт данных
        function exportData() {
            const data = JSON.parse(localStorage.getItem('userData') || '[]');
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_export_${new Date().toISOString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage('Данные экспортированы');
        }

        // Импорт данных
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.setItem('userData', JSON.stringify(data));
                    showMessage('Данные импортированы');
                    loadData();
                } catch (error) {
                    showMessage('Неверный формат файла', 'error');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // Очистка всех данных
        function clearAllData() {
            if (confirm('ВНИМАНИЕ! Это удалит ВСЕ данные. Продолжить?')) {
                localStorage.removeItem('userData');
                loadData();
                showMessage('Все данные удалены');
            }
        }

        // Инициализация
        loadData();
    </script>
</body>
</html>
