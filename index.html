
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система хранения и анализа данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: #e0e0e0;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .delete-btn, .edit-btn {
            padding: 5px 10px;
            font-size: 12px;
            margin: 0 3px;
        }

        .delete-btn {
            background: #dc3545;
        }

        .edit-btn {
            background: #28a745;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .edit-btn:hover {
            background: #218838;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        .message.success {
            background: #28a745;
        }

        .message.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .chart-container {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        canvas {
            max-height: 400px;
        }

        .import-export {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Система хранения и анализа данных</h1>
            <p>Добавляйте, редактируйте и анализируйте свои данные</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add')">➕ Добавить данные</button>
            <button class="tab-btn" onclick="switchTab('view')">📋 Просмотр данных</button>
            <button class="tab-btn" onclick="switchTab('analyze')">📈 Анализ данных</button>
            <button class="tab-btn" onclick="switchTab('manage')">⚙️ Управление</button>
        </div>

        <!-- Вкладка добавления данных -->
        <div id="add-tab" class="tab-content active">
            <h2>Добавить новую запись</h2>
            <form id="data-form">
                <div class="form-group">
                    <label>Название/Имя:</label>
                    <input type="text" id="item-name" required placeholder="Введите название">
                </div>
                <div class="form-group">
                    <label>Категория:</label>
                    <select id="item-category">
                        <option value="Работа">Работа</option>
                        <option value="Личное">Личное</option>
                        <option value="Финансы">Финансы</option>
                        <option value="Обучение">Обучение</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Значение (число):</label>
                    <input type="number" id="item-value" step="any" required placeholder="Введите числовое значение">
                </div>
                <div class="form-group">
                    <label>Описание:</label>
                    <textarea id="item-description" rows="3" placeholder="Дополнительная информация"></textarea>
                </div>
                <button type="submit">💾 Сохранить данные</button>
            </form>
        </div>

        <!-- Вкладка просмотра данных -->
        <div id="view-tab" class="tab-content">
            <div class="import-export">
                <button onclick="exportData()">📥 Экспорт в JSON</button>
                <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
                <button onclick="document.getElementById('import-file').click()">📤 Импорт из JSON</button>
                <button onclick="clearAllData()" style="background:#dc3545">🗑️ Очистить все данные</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Категория</th>
                            <th>Значение</th>
                            <th>Описание</th>
                            <th>Дата создания</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="data-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка анализа данных -->
        <div id="analyze-tab" class="tab-content">
            <div class="stats-grid" id="stats-grid">
                <!-- Статистика загрузится сюда -->
            </div>
            
            <div class="chart-container">
                <h3>Распределение по категориям</h3>
                <canvas id="category-chart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3>Топ-10 по значению</h3>
                <canvas id="top-values-chart"></canvas>
            </div>
            
            <div class="chart-container">
                <h3>Анализ по времени</h3>
                <canvas id="timeline-chart"></canvas>
            </div>
        </div>

        <!-- Вкладка управления -->
        <div id="manage-tab" class="tab-content">
            <h2>Фильтрация и поиск</h2>
            <div class="form-group">
                <label>Поиск по названию:</label>
                <input type="text" id="search-name" placeholder="Введите название..." onkeyup="filterData()">
            </div>
            <div class="form-group">
                <label>Фильтр по категории:</label>
                <select id="filter-category" onchange="filterData()">
                    <option value="all">Все категории</option>
                    <option value="Работа">Работа</option>
                    <option value="Личное">Личное</option>
                    <option value="Финансы">Финансы</option>
                    <option value="Обучение">Обучение</option>
                    <option value="Другое">Другое</option>
                </select>
            </div>
            <div class="form-group">
                <label>Диапазон значений:</label>
                <input type="number" id="min-value" placeholder="Минимум" onkeyup="filterData()">
                <input type="number" id="max-value" placeholder="Максимум" onkeyup="filterData()" style="margin-top:10px">
            </div>
            <div id="filtered-stats" style="margin-top:20px; padding:15px; background:#f8f9fa; border-radius:10px"></div>
        </div>
    </div>

    <script>
        let allData = [];
        let categoryChart, topValuesChart, timelineChart;

        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'analyze') {
                loadAnalysis();
            }
            if (tab === 'view') {
                loadData();
            }
        }

        // Показ сообщения
        function showMessage(message, type = 'success') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Загрузка всех данных
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                allData = await response.json();
                displayData(allData);
                updateFilteredStats(allData);
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }

        // Отображение данных в таблице
        function displayData(data) {
            const tbody = document.getElementById('data-list');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${item.id}</td>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${item.category}</td>
                    <td>${item.value}</td>
                    <td>${escapeHtml(item.description || '')}</td>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td>
                        <button class="edit-btn" onclick="editItem(${item.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
                    </td>
                `;
            });
        }

        // Добавление данных
        document.getElementById('data-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('item-name').value;
            const category = document.getElementById('item-category').value;
            const value = parseFloat(document.getElementById('item-value').value);
            const description = document.getElementById('item-description').value;
            
            try {
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, category, value, description})
                });
                
                if (response.ok) {
                    showMessage('Данные успешно сохранены!');
                    document.getElementById('data-form').reset();
                    loadData();
                } else {
                    showMessage('Ошибка при сохранении', 'error');
                }
            } catch (error) {
                showMessage('Ошибка при сохранении', 'error');
            }
        });

        // Удаление записи
        async function deleteItem(id) {
            if (confirm('Вы уверены, что хотите удалить эту запись?')) {
                try {
                    await fetch(`/api/data/${id}`, {method: 'DELETE'});
                    showMessage('Запись удалена');
                    loadData();
                    if (document.getElementById('analyze-tab').classList.contains('active')) {
                        loadAnalysis();
                    }
                } catch (error) {
                    showMessage('Ошибка при удалении', 'error');
                }
            }
        }

        // Редактирование записи
        async function editItem(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;
            
            const newName = prompt('Введите новое название:', item.name);
            if (newName) {
                const newValue = prompt('Введите новое значение:', item.value);
                if (newValue) {
                    try {
                        await fetch(`/api/data/${id}`, {
                            method: 'PUT',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                name: newName,
                                value: parseFloat(newValue),
                                category: item.category,
                                description: item.description
                            })
                        });
                        showMessage('Запись обновлена');
                        loadData();
                        if (document.getElementById('analyze-tab').classList.contains('active')) {
                            loadAnalysis();
                        }
                    } catch (error) {
                        showMessage('Ошибка при обновлении', 'error');
                    }
                }
            }
        }

        // Фильтрация данных
        function filterData() {
            const searchTerm = document.getElementById('search-name').value.toLowerCase();
            const category = document.getElementById('filter-category').value;
            const minValue = parseFloat(document.getElementById('min-value').value);
            const maxValue = parseFloat(document.getElementById('max-value').value);
            
            let filtered = allData;
            
            if (searchTerm) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(searchTerm));
            }
            if (category !== 'all') {
                filtered = filtered.filter(item => item.category === category);
            }
            if (!isNaN(minValue)) {
                filtered = filtered.filter(item => item.value >= minValue);
            }
            if (!isNaN(maxValue)) {
                filtered = filtered.filter(item => item.value <= maxValue);
            }
            
            displayData(filtered);
            updateFilteredStats(filtered);
        }

        // Обновление статистики фильтрации
        function updateFilteredStats(data) {
            const statsDiv = document.getElementById('filtered-stats');
            const total = data.length;
            const sum = data.reduce((acc, item) => acc + item.value, 0);
            const avg = total > 0 ? sum / total : 0;
            const max = data.length > 0 ? Math.max(...data.map(item => item.value)) : 0;
            const min = data.length > 0 ? Math.min(...data.map(item => item.value)) : 0;
            
            statsDiv.innerHTML = `
                <h3>Результаты фильтрации:</h3>
                <p>📊 Количество записей: ${total}</p>
                <p>💰 Сумма значений: ${sum.toFixed(2)}</p>
                <p>📈 Среднее значение: ${avg.toFixed(2)}</p>
                <p>📉 Максимум: ${max}</p>
                <p>📈 Минимум: ${min}</p>
            `;
        }

        // Загрузка анализа
        async function loadAnalysis() {
            try {
                const response = await fetch('/api/analysis');
                const analysis = await response.json();
                
                // Статистические карточки
                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <h3>Всего записей</h3>
                        <div class="value">${analysis.total_count}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Сумма значений</h3>
                        <div class="value">${analysis.total_sum.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Среднее значение</h3>
                        <div class="value">${analysis.average_value.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Максимум</h3>
                        <div class="value">${analysis.max_value}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Минимум</h3>
                        <div class="value">${analysis.min_value}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Медиана</h3>
                        <div class="value">${analysis.median_value.toFixed(2)}</div>
                    </div>
                `;
                
                // График по категориям
                if (categoryChart) categoryChart.destroy();
                const ctx1 = document.getElementById('category-chart').getContext('2d');
                categoryChart = new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: analysis.category_stats.map(item => item.category),
                        datasets: [{
                            label: 'Сумма значений',
                            data: analysis.category_stats.map(item => item.total),
                            backgroundColor: 'rgba(102, 126, 234, 0.6)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' }
                        }
                    }
                });
                
                // Топ значений
                if (topValuesChart) topValuesChart.destroy();
                const ctx2 = document.getElementById('top-values-chart').getContext('2d');
                topValuesChart = new Chart(ctx2, {
                    type: 'horizontalBar',
                    data: {
                        labels: analysis.top_items.map(item => item.name),
                        datasets: [{
                            label: 'Значение',
                            data: analysis.top_items.map(item => item.value),
                            backgroundColor: 'rgba(118, 75, 162, 0.6)',
                            borderColor: 'rgba(118, 75, 162, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' }
                        }
                    }
                });
                
                // Временная шкала
                if (timelineChart) timelineChart.destroy();
                const ctx3 = document.getElementById('timeline-chart').getContext('2d');
                timelineChart = new Chart(ctx3, {
                    type: 'line',
                    data: {
                        labels: analysis.timeline.map(item => item.date),
                        datasets: [{
                            label: 'Количество записей',
                            data: analysis.timeline.map(item => item.count),
                            backgroundColor: 'rgba(102, 126, 234, 0.2)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 2,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' }
                        }
                    }
                });
            } catch (error) {
                console.error('Ошибка загрузки анализа:', error);
            }
        }

        // Экспорт данных
        async function exportData() {
            try {
                const response = await fetch('/api/export');
                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `data_export_${new Date().toISOString()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showMessage('Данные экспортированы');
            } catch (error) {
                showMessage('Ошибка при экспорте', 'error');
            }
        }

        // Импорт данных
        async function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    const response = await fetch('/api/import', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        showMessage('Данные импортированы');
                        loadData();
                    } else {
                        showMessage('Ошибка при импорте', 'error');
                    }
                } catch (error) {
                    showMessage('Неверный формат файла', 'error');
                }
            };
            reader.readAsText(file);
        }

        // Очистка всех данных
        async function clearAllData() {
            if (confirm('ВНИМАНИЕ! Это удалит все данные. Продолжить?')) {
                try {
                    await fetch('/api/clear', {method: 'DELETE'});
                    showMessage('Все данные удалены');
                    loadData();
                    if (document.getElementById('analyze-tab').classList.contains('active')) {
                        loadAnalysis();
                    }
                } catch (error) {
                    showMessage('Ошибка при очистке', 'error');
                }
            }
        }

        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        loadData();
    </script>
</body>
</html>
